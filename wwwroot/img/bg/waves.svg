  </defs>
  
  <!-- Фоновый прямоугольник с градиентом -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Волнистые линии -->
  <!-- Линия 1 -->
  <path d="M 0,200 Q 240,150 480,200 T 960,200 T 1440,200 T 1920,200" 
