  <!-- Линия 3 -->
  <path d="M 0,500 Q 240,450 480,500 T 960,500 T 1440,500 T 1920,500" 
        stroke="#D5C8FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Линия 4 -->
  <path d="M 0,650 Q 240,600 480,650 T 960,650 T 1440,650 T 1920,650" 
        stroke="#E0D8FF" stroke-width="1.5" fill="none" opacity="0.5"/>
  
  <!-- Линия 5 -->
  <path d="M 0,800 Q 240,750 480,800 T 960,800 T 1440,800 T 1920,800" 
